name: Auto Deploy ER Data Collector

env:
  REMOTE_DEPLOY_DIR: /home/wj/Er_data_collector
  COMPOSE_FILE: docker-compose.yml
  IGNORED_PATHS: ".gitignore"
  GIT_SSH_PORT: "2222"

  SSH_HOST: ${{ secrets.LBX_HOME01_HOST }}
  SSH_USER: ${{ secrets.LBX_HOME01_USER }}
  SSH_PORT: ${{ secrets.LBX_HOME01_PORT }}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.detect-changes.outputs.targets }}
      reason: ${{ steps.detect-changes.outputs.reason }}

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Detect changed services
        id: detect-changes
        shell: bash
        run: |
          declare -A serviceMap
          serviceMap["collect_data_raw"]="collect_raw_now,collect_raw_before"
          serviceMap["collect_game_info"]="collect_game_info"
          serviceMap["generate_statistics"]="generate_stats_now,generate_stats_before"
          serviceMap["generate_user_report"]="generate_user_report"
          serviceMap["data_sync_agent"]="er_db_sync_worker"

          echo "Detecting changes for event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
              files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
              if [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
                  if git rev-parse HEAD^ >/dev/null 2>&1; then
                    files=$(git log --name-only --pretty=format:'' HEAD^..HEAD)
                  else
                    files=$(git log --name-only --pretty=format:'' HEAD)
                  fi
              else
                  files=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }})
              fi
          fi

          changedFiles=()
          while IFS= read -r line; do
              [ -n "$line" ] && changedFiles+=("$line")
          done <<< "$files"

          echo "Changed files found:"
          for file in "${changedFiles[@]}"; do echo "- $file"; done

          targets_array=()
          reason=""
          IFS=' ' read -r -a ignorePaths <<< "${{ env.IGNORED_PATHS }}"

          for file in "${changedFiles[@]}"; do
              normalizedPath="${file//\\//}"

              isIgnored=false
              for ignore in "${ignorePaths[@]}"; do
                  if [[ "$normalizedPath" == "$ignore"* ]]; then
                      isIgnored=true
                      break
                  fi
              done
              $isIgnored && continue

              if [[ "$normalizedPath" == "common/"* ]]; then
                  targets_array=()
                  for service_name in "${serviceMap[@]}"; do
                      IFS=',' read -r -a current_services <<< "$service_name"
                      for svc in "${current_services[@]}"; do
                          if ! printf '%s\n' "${targets_array[@]}" | grep -q -Fx "$svc"; then
                              targets_array+=("$svc")
                          fi
                      done
                  done
                  reason="Common module changed, all services will be deployed."
                  break
              fi

              for path_key in "${!serviceMap[@]}"; do
                  if [[ "$normalizedPath" == "$path_key/"* ]]; then
                      service_names="${serviceMap[$path_key]}"
                      IFS=',' read -r -a current_services <<< "$service_names"
                      for svc in "${current_services[@]}"; do
                          if ! printf '%s\n' "${targets_array[@]}" | grep -q -Fx "$svc"; then
                              targets_array+=("$svc")
                          fi
                      done
                  fi
              done
          done

          declare -A unique_map
          for target in "${targets_array[@]}"; do unique_map["$target"]=1; done
          mapfile -t uniqueTargets_array < <(printf '%s\n' "${!unique_map[@]}" | sort)

          if [ -z "$reason" ] && [ ${#uniqueTargets_array[@]} -gt 0 ]; then
              reason="Changes detected in: $(IFS=','; echo "${uniqueTargets_array[*]}")"
          elif [ ${#uniqueTargets_array[@]} -eq 0 ]; then
              reason="No deployable changes detected."
          fi

          targetString=$(IFS=','; echo "${uniqueTargets_array[*]}")
          echo "Final Targets: $targetString"
          echo "Reason: $reason"

          OUT="${GITEA_OUTPUT:-${GITHUB_OUTPUT:-}}"
          echo "targets=$targetString" >> "$OUT"
          echo "reason=$reason" >> "$OUT"

      - name: 3. Show detected targets
        run: |
          echo "Deployment Targets: ${{ steps.detect-changes.outputs.targets }}"
          echo "Reason: ${{ steps.detect-changes.outputs.reason }}"

      - name: 4. Deploy to remote server
        if: github.event_name == 'push' && steps.detect-changes.outputs.targets != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_SSH_PORT
          script: |
            set -e
            cd ${{ env.REMOTE_DEPLOY_DIR }}
            chmod +x deploy.sh
            ./deploy.sh "${{ steps.detect-changes.outputs.targets }}"
